name: hydropilot
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  fl_chart: ^1.2.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
